name: Deploy to GitHub Pages

on:
  push:
    branches: [ v4 ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Install dependencies
        run: npm ci
        
      - name: Build with Vite
        run: npm run build
        env:
          # Пытаемся использовать прямое подключение к API
          VITE_USE_CORS_PROXY: "false"
          # Если будут проблемы с CORS, можно включить proxy:
          # VITE_USE_CORS_PROXY: "true"
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4 